id: no-inline-newstyle
language: go
rule:
  pattern: lipgloss.NewStyle()
severity: error
message: |
  lipgloss.NewStyle() is only allowed inside internal/uikit/.
  Use uikit.TUI accessors for semantic styles, or uikit.TUI.Base() for layout containers.
  See CLAUDE.md: "No inline lipgloss.NewStyle() outside internal/uikit/"
ignores:
  - "internal/uikit/*.go"
