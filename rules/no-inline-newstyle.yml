id: no-inline-newstyle
language: go
rule:
  pattern: lipgloss.NewStyle()
severity: error
message: |
  lipgloss.NewStyle() is only allowed in style files (internal/uikit/ or internal/tui/*/ui/).
  Use uikit.TUI accessors for semantic styles, or uikit.TUI.Base() for layout containers.
  See CLAUDE.md: "No inline lipgloss.NewStyle() outside internal/uikit/ or internal/tui/*/ui/"
ignores:
  - "internal/uikit/*.go"
  - "internal/tui/*/ui/*.go"
  - "internal/tui/dbtui/app/mode_styles.go"
  - "internal/cmdutil/huh_theme.go"
