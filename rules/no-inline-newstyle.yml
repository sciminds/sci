id: no-inline-newstyle
language: go
rule:
  pattern: lipgloss.NewStyle()
severity: error
message: |
  lipgloss.NewStyle() is only allowed in style files (internal/ui/ or internal/tui/*/ui/).
  Use ui.TUI accessors for semantic styles, or ui.TUI.Base() for layout containers.
  See CLAUDE.md: "No inline lipgloss.NewStyle() outside internal/ui/ or internal/tui/*/ui/"
ignores:
  - "internal/ui/*.go"
  - "internal/tui/*/ui/*.go"
