id: no-hardcoded-color
language: go
rule:
  pattern: lipgloss.Color($STR)
severity: error
message: |
  Hardcoded lipgloss.Color() is only allowed in the uikit palette.
  Define colors in internal/uikit/color_palette.go and reference via uikit.TUI.Palette().
ignores:
  - "internal/uikit/color_palette.go"
  - "internal/uikit/color_styles.go"
