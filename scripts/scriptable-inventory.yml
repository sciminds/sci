# scriptable-inventory.yml — Interactive ↔ Non-interactive parity tracker
#
# Every huh.New* prompt and tea.NewProgram/uikit.Run TUI launch (outside exempt
# paths) must have an entry here. lint-guard rule 13 fails the build when an
# unregistered call site appears.
#
# Matching uses file + type + nth (the Nth occurrence of that call type in the
# file, ordered by source line). Line numbers are kept as documentation but are
# NOT used for matching — refactors that move code within a file won't cause
# drift as long as the order of same-typed calls is preserved.
#
# Call-site discovery uses ast-grep (scripts/interactive-calls.yml) for
# structural precision — comments, strings, and test files are ignored.
#
# status values:
#   covered  — a flag/arg fully bypasses the interactive prompt
#   gap      — no non-interactive bypass exists yet (tracked debt)
#   exempt   — intentionally interactive-only (read-only browsers, etc.)
#
# Exempt paths (no entries needed):
#   internal/tui/dbtui/     — standalone TUI app
#   internal/mdview/        — standalone TUI app
#   internal/tui/board/     — standalone TUI app
#   internal/cliui/spinner.go — progress display, not user input
#   internal/cmdutil/        — shared helpers (callers are tracked)
#   internal/uikit/          — shared TUI infra (callers are tracked)

commands:

  # ── doctor ─────────────────────────────────────────────────────────────────
  doctor:
    file: cmd/sci/doctor.go
    prompts:
      - id: git-name
        type: huh.NewInput
        nth: 1
        line: 358
        description: "Git user.name"
        bypass: "--git-name"
        status: covered

      - id: git-email
