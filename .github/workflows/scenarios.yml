name: Environment Scenarios

# Simulates the three environment states a sci user might be in:
#   1. no-brew      — fresh machine, Homebrew not installed
#   2. brew-no-file — Homebrew installed, no Brewfile on disk
#   3. brew-file    — Homebrew installed, existing Brewfile with entries

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  scenario:
    runs-on: macos-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')"

    strategy:
      fail-fast: false
      matrix:
        scenario: [no-brew, no-brew-accept, brew-no-file, brew-file]

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SCI_SCENARIO: ${{ matrix.scenario }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install just
        run: brew install just

      - name: Build sci (just build)
        run: |
          # Use the project's `build` recipe so ldflags / version.Commit
          # can't drift between release.yml, scenarios.yml, and a
          # developer's machine. (Not `just ok` — that runs the full
          # fmt/lint/test gate, which needs goimports/golangci-lint/etc.
          # not preinstalled here. The check workflow owns that gate.)
          just build
          mkdir -p "${HOME}/.local/bin"
          cp sci "${HOME}/.local/bin/sci"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"

      # --- Scenario setup -------------------------------------------------

      - name: Scenario — uninstall Homebrew
        if: matrix.scenario == 'no-brew' || matrix.scenario == 'no-brew-accept'
        run: |
          # GitHub's macOS runners ship Homebrew preinstalled. Run the official
          # uninstall script non-interactively, then scrub any leftovers.
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/uninstall.sh)" -- --force
          # Drop brew prefixes from PATH so subsequent steps can't see brew.
          sed -i '' -E '/\/opt\/homebrew|\/usr\/local\/Homebrew/d' "$GITHUB_PATH" 2>/dev/null || true
          # Confirm it's gone.
          if command -v brew >/dev/null 2>&1; then
            echo "brew is still on PATH: $(command -v brew)"
            exit 1
          fi
          echo "Homebrew removed."

      - name: Scenario — ensure no Brewfile
        if: matrix.scenario == 'brew-no-file'
        run: |
          rm -r "${HOME}/.config/homebrew" 2>/dev/null || true
          rm -r "${HOME}/.homebrew" 2>/dev/null || true
          unset HOMEBREW_BUNDLE_FILE_GLOBAL
          brew --version
          echo "Homebrew present, no Brewfile."

      - name: Scenario — seed a Brewfile
        if: matrix.scenario == 'brew-file'
        run: |
          mkdir -p "${HOME}/.config/homebrew"
          cat > "${HOME}/.config/homebrew/Brewfile" <<'EOF'
          # Seeded by CI scenarios.yml
          tap "homebrew/bundle"
          brew "jq"
          EOF
          brew --version
          echo "Seeded Brewfile:"
          cat "${HOME}/.config/homebrew/Brewfile"

      # --- Exercise sci ---------------------------------------------------

      - name: sci --help
        run: sci --help

      - name: sci doctor (JSON, tolerant)
        if: matrix.scenario != 'no-brew-accept'
        run: |
          set +e
          sci doctor --json --git-name "CI Scenario" --git-email "ci@sciminds.com"
          code=$?
          echo "exit=$code"
          # Only brew-file / brew-no-file must succeed; no-brew failing is expected.
          if [ "$SCI_SCENARIO" != "no-brew" ] && [ "$code" -ne 0 ]; then
            echo "::error::sci doctor --json must succeed when brew is present"
            exit "$code"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: sci doctor (LIVE Homebrew install via SCI_ASSUME=yes)
        if: matrix.scenario == 'no-brew-accept'
        timeout-minutes: 15
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCI_ASSUME: "yes"
        run: |
          # Human-mode doctor; the SCI_ASSUME=yes env var drives the
          # "Install Homebrew?" prompt through without a TTY.
          sci doctor --git-name "CI Scenario" --git-email "ci@sciminds.com" || true
          # Installer lands brew at /opt/homebrew/bin/brew (Apple Silicon runners).
          if [ -x /opt/homebrew/bin/brew ]; then
            /opt/homebrew/bin/brew --version
            echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          elif [ -x /usr/local/bin/brew ]; then
            /usr/local/bin/brew --version
            echo "/usr/local/bin" >> "$GITHUB_PATH"
          else
            echo "::error::brew binary not found after install"
            exit 1
          fi

      - name: sci tools list (JSON, tolerant)
        # In no-brew / brew-no-file this may fail by design — capture output
        # so we can see *how* it fails rather than masking it.
        run: |
          set +e
          sci tools list --json
          code=$?
          echo "exit=$code"
          # For the brew-file scenario we expect success.
          if [ "$SCI_SCENARIO" = "brew-file" ] && [ "$code" -ne 0 ]; then
            echo "::error::sci tools list must succeed when a Brewfile exists"
            exit "$code"
          fi

      - name: sci tools install --dry-run (brew-file only)
        if: matrix.scenario == 'brew-file'
        run: sci tools install --dry-run

      # After the live Homebrew install, exercise the full tools lifecycle
      # to confirm the rest of the CLI works end-to-end on a freshly set up
      # machine. Uses --json so no prompts are required.
      - name: sci tools lifecycle (no-brew-accept only)
        if: matrix.scenario == 'no-brew-accept'
        timeout-minutes: 20
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCI_ASSUME: "yes"
        run: |
          set -euxo pipefail
          # Overwrite whatever doctor dumped — we need a deterministic
          # single-formula Brewfile so install/uninstall have something to
          # act on. Doctor's dump captures the fresh brew state (empty),
          # which wouldn't exercise the install→uninstall round trip.
          mkdir -p "${HOME}/.config/homebrew"
          BREWFILE="${HOME}/.config/homebrew/Brewfile"
          cat > "${BREWFILE}" <<'EOF'
          tap "homebrew/bundle"
          brew "jq"
          EOF

          # ---- Formula round trip (jq) -----------------------------------
          sci tools list --json
          # No package arg → install everything in the Brewfile (jq).
          sci tools install --json
          # Named-formula path with the new --formula flag (re-installs jq
          # as a no-op; the goal is to exercise the CLI surface).
          sci tools install jq --formula --json
          sci tools update --json
          sci tools uninstall --formula jq --json
          sci tools list --json

          # ---- uv tool round trip (ruff) ---------------------------------
          # Exercises InstallUVTools / UVToolList / uninstall path — the
          # uv-specific glue has no live coverage anywhere else.
          sci tools install ruff --uv --json
          sci tools list --uv --json | grep -q '"ruff"'
          grep -q '^uv "ruff"' "${BREWFILE}"
          sci tools uninstall --uv ruff --json
          ! grep -q '^uv "ruff"' "${BREWFILE}"

          # ---- Cask round trip (font-fira-code) --------------------------
          # Small font cask = fast, no GUI app to clean up. Exercises
          # brew install --cask / brew list --cask / brew uninstall --cask.
          sci tools install font-fira-code --cask --json
          sci tools list --cask --json | grep -q '"font-fira-code"'
          sci tools uninstall --cask font-fira-code --json

          # ---- Brewfile reconciliation (brew.Sync) -----------------------
          # Install a formula behind sci's back, then assert `tools list`
          # reconciles it back into the Brewfile.
          brew install tree
          sci tools list --json | grep -q '"tree"'
          grep -q '^brew "tree"' "${BREWFILE}"
          sci tools uninstall --formula tree --json

          # ---- Optional-tool catalog (reccs) -----------------------------
          # Exercises doctor.ListOptionalTools + doctor.InstallOptionalTool,
          # which use DirectInstall + a separate sync path.
          sci tools reccs --json | grep -q '"name"'
          sci tools reccs --install rg --json
          sci tools list --json | grep -q '"rg"'
          sci tools uninstall --formula rg --json

          # ---- Outdated → upgrade branch ---------------------------------
          # macOS runners ship many preinstalled brew formulae, so
          # `brew outdated` usually returns something. Human mode +
          # SCI_ASSUME=yes auto-confirms the upgrade prompt and exercises
          # brew.UpgradeOnly. If nothing is outdated it short-circuits
          # cleanly — still more coverage than the JSON-only path.
          sci tools outdated --json
          sci tools outdated

      - name: Summary
        if: always()
        run: |
          echo "Scenario:    ${SCI_SCENARIO}"
          echo "brew on PATH: $(command -v brew || echo '(none)')"
          echo "Brewfile:    $(ls -la "${HOME}/.config/homebrew/Brewfile" 2>/dev/null || echo '(none)')"
