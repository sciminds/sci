name: Release

# Triggers:
#   - workflow_run: normal path — wait for Environment Scenarios to succeed on
#     main so a broken scenario matrix blocks the release build.
#   - push: fast path — commits whose message contains `RELEASE FAST` skip the
#     scenarios wait and run release immediately (still gated by check-ci).
#   - workflow_dispatch: manual override.
on:
  workflow_run:
    workflows: ["Environment Scenarios"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish a release (otherwise the run is a test build only)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    # For workflow_run triggers, require that upstream succeeded and skip
    # [skip ci] / [ci skip] commits. workflow_dispatch bypasses these. push
    # only fires when the commit message contains `RELEASE FAST`.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       contains(github.event.head_commit.message, 'RELEASE FAST')) ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       !contains(github.event.workflow_run.head_commit.message, '[skip ci]') &&
       !contains(github.event.workflow_run.head_commit.message, '[ci skip]'))

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # SHA that was actually tested by the upstream scenarios run (for
      # workflow_run triggers). For push / workflow_dispatch this falls back
      # to github.sha. Referenced by the checkout and release-body steps.
      TESTED_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      RELEASE_COMMIT_MSG: ${{ github.event.workflow_run.head_commit.message || github.event.head_commit.message }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ env.TESTED_SHA }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install tools
        # Go dev tools (goimports, golangci-lint, gopls, gofumpt, dlv) are
        #   pinned in go.mod's `tool` block and installed via `go install tool`
        #   — keeps local↔CI versions identical with no drift.
        # just  — drives the local↔CI gate (justfile `check-ci` recipe).
        # rg/fd/jaq/ast-grep — used by scripts/lint-guard.sh under
        #   set -euo pipefail, so a missing binary aborts the rule script.
        # duckdb — required dep (internal/doctor/Brewfile); internal/duck +
        #   `sci db` parity tests need it on PATH.
        run: |
          go install tool
          brew install just ripgrep fd jaq ast-grep duckdb

      - name: Gate (just check-ci)
        # Single source of truth with the local gate: tidy/fmt/vet/lint/
        # lint-guard/test -race. Add a step in justfile's `check-ci`, it
        # lands here automatically.
        run: just check-ci

      - name: Build
        run: |
          COMMIT="${TESTED_SHA}"
          LDFLAGS="-s -w -X github.com/sciminds/cli/internal/version.Commit=${COMMIT}"

          mkdir -p dist

          for PAIR in darwin/arm64 darwin/amd64 linux/arm64 linux/amd64; do
            OS="${PAIR%/*}"
            ARCH="${PAIR#*/}"
            SUFFIX="${OS}-${ARCH}"

            echo "==> Building sci-${SUFFIX}"
            GOOS="${OS}" GOARCH="${ARCH}" go build -ldflags="${LDFLAGS}" -o "dist/sci-${SUFFIX}" ./cmd/sci
          done

          echo "==> Verify native build"
          ./dist/sci-darwin-arm64 --help || ./dist/sci-darwin-amd64 --help

      - name: Compute SHA256 checksums
        id: checksums
        # Emit one **SHA256(<asset>):** line per sci-* binary into the release
        # body. `sci update` parses these and refuses to install a binary
        # whose hash doesn't match.
        run: |
          {
            for f in dist/sci-*; do
              base="$(basename "$f")"
              sum="$(shasum -a 256 "$f" | awk '{print $1}')"
              echo "sha_${base}=${sum}" >> "$GITHUB_OUTPUT"
              echo "**SHA256(${base}):** ${sum}"
            done
          } | tee /tmp/sha256-lines.txt
          {
            echo 'sha_lines<<SHALINES_EOF'
            cat /tmp/sha256-lines.txt
            echo 'SHALINES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Delete existing release
        if: (github.event_name == 'workflow_dispatch' && inputs.publish) || contains(env.RELEASE_COMMIT_MSG, 'BUILD RELEASE') || contains(env.RELEASE_COMMIT_MSG, 'RELEASE FAST')
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: (github.event_name == 'workflow_dispatch' && inputs.publish) || contains(env.RELEASE_COMMIT_MSG, 'BUILD RELEASE') || contains(env.RELEASE_COMMIT_MSG, 'RELEASE FAST')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: latest
          name: sci latest
          files: dist/*
          make_latest: true
          draft: false
          body: |
            Latest build from `main` branch.

            **Commit:** ${{ env.TESTED_SHA }}

            ${{ steps.checksums.outputs.sha_lines }}

            **Install:** `curl -fsSL https://raw.githubusercontent.com/sciminds/sci/main/install.sh | sh`

