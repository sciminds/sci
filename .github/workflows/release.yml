name: Build & Release

# Primary CI gate. Runs `just check-ci` + cross-compiles all four release
# binaries on every push to main and every PR — proving the release artifact
# step still works on every commit, not just at release time.
#
# Publishing is opt-in via commit message:
#   - `[release]` on a main commit → publish after the gate passes.
#   - workflow_dispatch with publish=true → manual override.
#
# The Environment Scenarios workflow is fully decoupled: it runs weekly and
# on opt-in (`[scenarios]` in the commit message). If you want a release
# that's also been validated against the scenario matrix, drop both
# `[release]` and `[scenarios]` into the same commit.
#
# Bracket markers (rather than UPPERCASE phrases) so a commit message that
# describes the trigger in prose doesn't accidentally fire it. Match style
# follows the existing `[skip ci]` convention.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish a release (otherwise the run is a test build only)"
        type: boolean
        required: false
        default: false

# main runs never cancel — a release commit's build must finish even if
# another push lands on top of it. PR runs cancel on push, which is normal.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    # Skip [skip ci] / [ci skip] commits. head_commit is undefined on PRs;
    # `contains(null, …)` evaluates to false, so PRs always run.
    if: >
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]')

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Homebrew downloads
        # Caches bottle downloads under $(brew --cache). On hit, the brew
        # install step below skips the network fetch and only links — the
        # formulae below collectively pull ~hundreds of MB of bottles.
        # The cache key hashes this workflow file so it auto-invalidates
        # when the formula list changes; restore-keys give a partial hit
        # for any prior release-cache.
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-cache-${{ runner.os }}-release-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            brew-cache-${{ runner.os }}-release-

      - name: Install tools
        # Go dev tools (goimports, golangci-lint, gopls, gofumpt, dlv) are
        #   pinned in go.mod's `tool` block and installed via `go install tool`
        #   — keeps local↔CI versions identical with no drift.
        # just  — drives the local↔CI gate (justfile `check-ci` recipe).
        # rg/fd/jaq/ast-grep — used by scripts/lint-guard.sh under
        #   set -euo pipefail, so a missing binary aborts the rule script.
        # duckdb — required dep (internal/doctor/Brewfile); internal/duck +
        #   `sci db` parity tests need it on PATH.
        run: |
          go install tool
          brew install just ripgrep fd jaq ast-grep duckdb

      - name: Gate (just check-ci)
        # Single source of truth with the local gate: tidy/fmt/vet/lint/
        # lint-guard/test -race. Add a step in justfile's `check-ci`, it
        # lands here automatically.
        run: just check-ci

      - name: Build
        run: |
          COMMIT="${GITHUB_SHA}"
          LDFLAGS="-s -w -X github.com/sciminds/cli/internal/version.Commit=${COMMIT}"

          mkdir -p dist

          for PAIR in darwin/arm64 darwin/amd64 linux/arm64 linux/amd64; do
            OS="${PAIR%/*}"
            ARCH="${PAIR#*/}"
            SUFFIX="${OS}-${ARCH}"

            echo "==> Building sci-${SUFFIX}"
            GOOS="${OS}" GOARCH="${ARCH}" go build -ldflags="${LDFLAGS}" -o "dist/sci-${SUFFIX}" ./cmd/sci
          done

          echo "==> Verify native build"
          ./dist/sci-darwin-arm64 --help || ./dist/sci-darwin-amd64 --help

      - name: Compute SHA256 checksums
        id: checksums
        # Emit one **SHA256(<asset>):** line per sci-* binary into the release
        # body. `sci update` parses these and refuses to install a binary
        # whose hash doesn't match.
        run: |
          {
            for f in dist/sci-*; do
              base="$(basename "$f")"
              sum="$(shasum -a 256 "$f" | awk '{print $1}')"
              echo "sha_${base}=${sum}" >> "$GITHUB_OUTPUT"
              echo "**SHA256(${base}):** ${sum}"
            done
          } | tee /tmp/sha256-lines.txt
          {
            echo 'sha_lines<<SHALINES_EOF'
            cat /tmp/sha256-lines.txt
            echo 'SHALINES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Delete existing release
        if: >
          (github.event_name == 'workflow_dispatch' && inputs.publish) ||
          (github.event_name == 'push' &&
           contains(github.event.head_commit.message, '[release]'))
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: >
          (github.event_name == 'workflow_dispatch' && inputs.publish) ||
          (github.event_name == 'push' &&
           contains(github.event.head_commit.message, '[release]'))
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: latest
          name: sci latest
          files: dist/*
          make_latest: true
          draft: false
          body: |
            Latest build from `main` branch.

            **Commit:** ${{ github.sha }}

            ${{ steps.checksums.outputs.sha_lines }}

            **Install:** `curl -fsSL https://raw.githubusercontent.com/sciminds/sci/main/install.sh | sh`
