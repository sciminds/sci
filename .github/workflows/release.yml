name: Release

# Triggers only after Environment Scenarios succeeds on main (so a broken
# scenario matrix blocks the release build) or via manual dispatch.
on:
  workflow_run:
    workflows: ["Environment Scenarios"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish a release (otherwise the run is a test build only)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    # For workflow_run triggers, require that upstream succeeded and skip
    # [skip ci] / [ci skip] commits. workflow_dispatch bypasses these.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       !contains(github.event.workflow_run.head_commit.message, '[skip ci]') &&
       !contains(github.event.workflow_run.head_commit.message, '[ci skip]'))

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # SHA that was actually tested by the upstream scenarios run (for
      # workflow_run triggers). For workflow_dispatch this falls back to
      # github.sha. Referenced by the checkout and release-body steps.
      TESTED_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      RELEASE_COMMIT_MSG: ${{ github.event.workflow_run.head_commit.message }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ env.TESTED_SHA }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install tools
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Format
        run: |
          gofmt -l . | tee /tmp/gofmt.out
          test ! -s /tmp/gofmt.out
          goimports -l . | tee /tmp/goimports.out
          test ! -s /tmp/goimports.out

      - name: Vet
        run: go vet ./internal/... ./cmd/...

      - name: Lint
        run: golangci-lint run ./internal/... ./cmd/...

      - name: Test
        run: go test ./... -count=1

      - name: Build
        run: |
          COMMIT="${TESTED_SHA}"
          LDFLAGS="-s -w -X github.com/sciminds/cli/internal/version.Commit=${COMMIT}"
          LDFLAGS_PLAIN="-s -w"

          mkdir -p dist

          for PAIR in darwin/arm64 darwin/amd64 linux/arm64 linux/amd64; do
            OS="${PAIR%/*}"
            ARCH="${PAIR#*/}"
            SUFFIX="${OS}-${ARCH}"

            echo "==> Building sci-${SUFFIX}"
            GOOS="${OS}" GOARCH="${ARCH}" go build -ldflags="${LDFLAGS}" -o "dist/sci-${SUFFIX}" ./cmd/sci

            echo "==> Building dbtui-${SUFFIX}"
            GOOS="${OS}" GOARCH="${ARCH}" go build -ldflags="${LDFLAGS_PLAIN}" -o "dist/dbtui-${SUFFIX}" ./cmd/dbtui

          done

          echo "==> Verify native build"
          ./dist/sci-darwin-arm64 --help || ./dist/sci-darwin-amd64 --help

      - name: Delete existing release
        if: (github.event_name == 'workflow_dispatch' && inputs.publish) || contains(env.RELEASE_COMMIT_MSG, 'BUILD RELEASE')
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: (github.event_name == 'workflow_dispatch' && inputs.publish) || contains(env.RELEASE_COMMIT_MSG, 'BUILD RELEASE')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: latest
          name: sci latest
          files: dist/*
          make_latest: true
          draft: false
          body: |
            Latest build from `main` branch.

            **Commit:** ${{ env.TESTED_SHA }}

            **Install:** `curl -fsSL https://raw.githubusercontent.com/sciminds/sci/main/install.sh | sh`

